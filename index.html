
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Archive Banner</title>

<!-- Clean Professional Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
    --text-main: #ffffff;
    --font-main: 'Inter', sans-serif;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html, body {
    width: 100%;
    height: 100%;
    background: #000000;
    color: var(--text-main);
    font-family: var(--font-main);
    overflow: hidden; /* Strictly prevents any scrolling */
    -webkit-font-smoothing: antialiased;
    user-select: none; 
}

/* --- TRUE FULLSCREEN WRAPPER --- */
.story-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: #0a0a0a;
    overflow: hidden;
    z-index: 1;
}

/* --- DYNAMIC AMBIENT BACKGROUND --- */
.dynamic-bg-canvas {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120%; /* Bleeds past edges to avoid sharp borders */
    height: 120%;
    object-fit: cover;
    z-index: 0;
}

.dynamic-bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.85) 100%);
    z-index: 1;
}

/* 🎞 Grain Texture Overlay */
.story-wrapper::after {
    content: "";
    position: absolute;
    inset: 0;
    background: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.06;
    pointer-events: none;
    z-index: 2;
}

/* --- ABSOLUTE CENTERED CONTENT BLOCK --- */
.main-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
}

/* --- EDITABLE FOCUS & PLACEHOLDERS --- */
[contenteditable="true"] {
    outline: none;
    transition: all 0.2s;
    position: relative;
    z-index: 10;
    user-select: text; 
}
[contenteditable="true"]:empty:before {
    content: attr(placeholder);
    color: rgba(255, 255, 255, 0.4);
    pointer-events: none;
    display: block;
    font-style: italic;
}

/* --- POSTER & AVATAR LAYOUT --- */
.poster-wrapper {
    position: relative;
    width: 55%; /* Reduced from 65% */
    max-width: 270px; /* Reduced from 310px */
    aspect-ratio: 2 / 3;
    margin-bottom: 24px;
}

.poster {
    width: 100%;
    height: 100%;
    background-color: #111;
    background-position: center;
    background-size: cover;
    border-radius: 12px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    border: 0.8px solid #ffffff; 
    transition: background-image 0.3s ease;
}

.avatar {
    width: 48px;
    height: 48px;
    background-image: url('https://upperstall.com/wp-content/uploads/2021/05/Satyajit-Ray-as-a-Young-Man-560x600.jpg');
    background-position: center;
    background-size: cover;
    border-radius: 50%;
    position: absolute;
    top: -24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    border: 2px solid #ffffff; 
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
}

/* --- MOVIE INFO --- */
.info-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 90%;
    max-width: 400px;
    gap: 8px;
}

.title {
    font-size: 22px; /* Reduced from 26px */
    font-weight: 600; /* Reduced from 800 */
    letter-spacing: -0.5px;
    text-align: center;
    line-height: 1.2;
    text-shadow: 0 4px 15px rgba(0,0,0,0.8);
    color: #ffffff;
}

.meta {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.85); 
    font-weight: 600;
    margin-bottom: 2px; 
    text-align: center;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
}

/* --- RATING STARS & ABSOLUTE HEART --- */
.rating-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    position: relative; /* Container logic */
}

.rating-system {
    display: flex;
    align-items: center;
    position: relative; /* Heart will position perfectly relative to this block without expanding it */
}

.stars {
    display: flex;
    gap: 0px; 
}

.favorite-heart {
    position: absolute;
    left: calc(100% + 12px); /* Forces heart 12px to the right of the stars */
    top: 50%;
    transform: translateY(-50%); /* Centers vertically */
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    filter: drop-shadow(0 2px 10px rgba(255, 42, 85, 0.4));
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
/* Adjust click effect since we already have a transform for centering */
.favorite-heart:active {
    transform: translateY(-50%) scale(0.85);
}

/* --- ONE LINE REVIEW --- */
.review-text {
    font-size: 15px;
    font-weight: 500;
    font-style: italic;
    color: rgba(255, 255, 255, 0.95);
    text-align: center;
    margin-top: 4px;
    padding: 0 16px;
    line-height: 1.4;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    width: 100%;
}

/* --- CINEMATIC TYPOGRAPHY ARCHIVE LOCKUP --- */
.archive-lockup {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 32px;
    width: 85%;
    max-width: 260px;
    opacity: 0.95;
}

.lockup-line {
    width: 100%;
    height: 1px;
    /* Fading gradient lines give structure without feeling boxed in */
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    margin: 8px 0;
}

.lockup-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    width: 100%;
}

.lockup-brand {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 4px;
    color: rgba(255, 255, 255, 0.55);
    text-transform: uppercase;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}

.lockup-user {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #ffffff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}

.lockup-user i {
    font-style: italic;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.6);
    margin-right: 1px;
}

/* --- SMALL COMPACT TOOLBAR --- */
.fixed-bottom-panel {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 360px;
    background: rgba(15, 15, 15, 0.85);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 200;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
}

.fixed-bottom-panel.hidden {
    transform: translate(-50%, 150%);
    opacity: 0;
    pointer-events: none;
}

.compact-row {
    display: flex;
    gap: 8px;
    align-items: center;
    width: 100%;
}

.search-wrapper { position: relative; flex: 1; }
.search-box { 
    display: flex; 
    background: rgba(255, 255, 255, 0.06); 
    border: 1px solid rgba(255,255,255,0.1); 
    border-radius: 12px; 
    padding: 4px; 
    transition: 0.2s; 
}
.search-box:focus-within { border-color: rgba(255,255,255,0.3); }
.search-box input { 
    flex: 1; 
    background: transparent; 
    border: none; 
    color: #fff; 
    padding: 8px 12px; 
    font-family: inherit; 
    font-size: 13px; 
    outline: none; 
    width: 100%;
}
.search-box input::placeholder { color: rgba(255,255,255,0.3); }
.search-box button { 
    background: #ffffff; 
    color: #000000; 
    border: none; 
    border-radius: 8px; 
    padding: 0 12px; 
    cursor: pointer; 
    font-weight: 700; 
    font-size: 12px; 
}

.tool-btn { 
    background: rgba(255, 255, 255, 0.1); 
    border: 1px solid rgba(255, 255, 255, 0.05); 
    color: #ffffff; 
    height: 38px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    border-radius: 12px; 
    cursor: pointer; 
    font-weight: 600; 
    font-size: 12px; 
    padding: 0 8px;
    white-space: nowrap;
    flex: 1; 
}
.tool-btn:active { background: rgba(255, 255, 255, 0.2); }

/* Dropdown Suggestions */
.suggestions-container { position: absolute; bottom: calc(100% + 16px); left: 0; width: calc(100% + 100px); background: #1a1a1a; border: 1px solid #333; border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 250; display: none; flex-direction: column; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); }
.suggestion-item { display: flex; align-items: center; gap: 12px; padding: 12px; cursor: pointer; border-bottom: 1px solid #222; transition: background 0.2s; }
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover { background: #2a2a2a; }
.sugg-info { display: flex; flex-direction: column; gap: 2px; }
.sugg-title { font-size: 13px; font-weight: 600; color: #fff; }
.sugg-year { font-size: 11px; color: #aaa; }

/* System messages */
.msg-container { height: 12px; text-align: center; }
#searchMsg { font-size: 11px; color: #ff6b6b; font-weight: 500; line-height: 1; }

/* Double Tap Hint Notification */
.hint-toast {
    position: fixed;
    top: 40px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    pointer-events: none;
    transition: opacity 0.5s;
    z-index: 300;
}

/* Loading Overlay */
#loadingOverlay {
    position: fixed;
    inset: 0;
    background: #000;
    color: white;
    font-weight: bold;
    z-index: 10000;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
    justify-content: center;
    transition: opacity 0.3s;
}
.spinner {
    width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin 1s linear infinite;
}
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOADING SCREEN FOR INITIAL RANDOM MOVIE -->
<div id="loadingOverlay">
    <div class="spinner"></div>
    <div style="font-size: 13px; color: #aaa;">Fetching Movie...</div>
</div>

<!-- MAIN STORY BANNER FULLSCREEN -->
<div class="story-wrapper" id="storyWrapper">
    
    <!-- Native Canvas Background Blur -->
    <canvas id="bgCanvas" class="dynamic-bg-canvas"></canvas>
    <div class="dynamic-bg-overlay"></div>
    
    <!-- Centered Content Block -->
    <div class="main-content">
        <div class="poster-wrapper">
            <div class="avatar" id="avatarImg"></div>
            <div class="poster" id="posterImg"></div>
        </div>
        
        <div class="info-section">
            <h1 class="title" id="movieTitle" contenteditable="true" spellcheck="false" placeholder="Movie Title"></h1>
            <div class="meta" id="movieMeta" contenteditable="true" spellcheck="false" placeholder="dir. Director Name"></div>
            
            <!-- RATING & HEART WRAPPER -->
            <div class="rating-wrapper">
                <div class="rating-system">
                    <div class="stars" id="starsContainer">
                        <!-- Stars rendered dynamically -->
                    </div>
                    <!-- FAVORITE HEART (Absolute positioned, won't move stars) -->
                    <div class="favorite-heart" id="favoriteHeart" style="display: none;">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="#ff2a55">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                    </div>
                </div>
            </div>
            
            <!-- ONE LINE REVIEW -->
            <div class="review-text" id="movieReview" contenteditable="true" spellcheck="false" placeholder="Write a one-line review..." style="display: none;"></div>
            
            <!-- CINEMATIC TYPOGRAPHY LOCKUP -->
            <div class="archive-lockup">
                <div class="lockup-line"></div>
                <div class="lockup-content">
                    <span class="lockup-brand">ARCHIVE</span>
                    <span class="lockup-user"><i>@</i>4dwik</span>
                </div>
                <div class="lockup-line"></div>
            </div>
        </div>
    </div>
</div>

<!-- DOUBLE TAP HINT -->
<div class="hint-toast" id="hintToast">Double-tap anywhere to hide tools</div>

<!-- COMPACT FLOATING TOOLBAR WITH 2 ROWS -->
<div class="fixed-bottom-panel" id="toolbar">
    <!-- Row 1: Search -->
    <div class="compact-row">
        <div class="search-wrapper">
            <div id="suggestions" class="suggestions-container"></div>
            <div class="search-box">
                <input type="text" id="movieSearch" placeholder="Search for a movie..." autocomplete="off">
                <button id="searchBtn" onclick="triggerManualSearch()">Fetch</button>
            </div>
        </div>
    </div>
    
    <!-- Row 2: Action Buttons -->
    <div class="compact-row">
        <button class="tool-btn" onclick="fetchRandomMovie()">🎲 Rand</button>
        <button class="tool-btn" onclick="updateImg()">🔗 Poster</button>
        <button class="tool-btn" onclick="toggleReview()">💬 Rev</button>
        <button class="tool-btn" onclick="toggleHeart()">❤️ Fav</button>
    </div>
    
    <div class="msg-container"><div id="searchMsg"></div></div>
</div>

<script>
    // --- LIST OF ICONIC MOVIES FOR RANDOM REFRESH ---
    const popularMovies = [
        "Interstellar", "Inception", "The Matrix", "Fight Club", "Pulp Fiction", 
        "Forrest Gump", "Gladiator", "The Prestige", "The Departed", "Whiplash", 
        "Goodfellas", "Parasite", "Joker", "Coco", "WALL-E", "Your Name", 
        "Spirited Away", "The Lion King", "Back to the Future", "The Truman Show", 
        "Memento", "La La Land", "Prisoners", "Dune", "Arrival"
    ];

    // --- DOUBLE TAP TO TOGGLE UI ---
    const toolbar = document.getElementById('toolbar');
    let uiVisible = true;
    let lastTapTime = 0;

    function toggleUI() {
        uiVisible = !uiVisible;
        if (uiVisible) {
            toolbar.classList.remove('hidden');
        } else {
            toolbar.classList.add('hidden');
            document.getElementById('hintToast').style.opacity = '0';
        }
    }

    document.addEventListener('click', (e) => {
        if (e.target.closest('#toolbar') || e.target.closest('.stars') || e.target.closest('[contenteditable="true"]') || e.target.closest('.favorite-heart')) {
            return;
        }
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTapTime;
        if (tapLength < 300 && tapLength > 0) {
            toggleUI();
            e.preventDefault();
        }
        lastTapTime = currentTime;
    });

    setTimeout(() => { document.getElementById('hintToast').style.opacity = '0'; }, 4000);

    // --- TOGGLES ---
    function toggleReview() {
        const reviewEl = document.getElementById('movieReview');
        if (reviewEl.style.display === 'none' || reviewEl.style.display === '') {
            reviewEl.style.display = 'block';
        } else {
            reviewEl.style.display = 'none';
        }
    }

    function toggleHeart() {
        const heartEl = document.getElementById('favoriteHeart');
        if (heartEl.style.display === 'none' || heartEl.style.display === '') {
            heartEl.style.display = 'flex';
        } else {
            heartEl.style.display = 'none';
        }
    }

    // --- LOCAL CANVAS BLUR LOGIC ---
    function applyPoster(url) {
        document.getElementById('posterImg').style.backgroundImage = `url('${url}')`;

        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.crossOrigin = "anonymous"; 
        
        img.onload = () => {
            canvas.width = 180; 
            canvas.height = 320;
            ctx.filter = 'blur(15px) brightness(0.4) saturate(1.3)';
            ctx.drawImage(img, -20, -20, canvas.width + 40, canvas.height + 40);
        };
        
        img.onerror = () => {
            img.onload = null;
            img.onerror = null;
            img.src = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
        };
        img.src = url;
    }


    // --- PERFECT STAR RATING LOGIC ---
    const starsContainer = document.getElementById('starsContainer');
    const starPoints = "12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2";

    function updateStarsUI(val) {
        let html = '';
        for (let i = 0; i < 5; i++) {
            const fullStar = `<svg viewBox="0 0 24 24" width="24" height="24" style="display:block;"><polygon points="${starPoints}" fill="#ffffff"/></svg>`;
            const emptyStar = `<svg viewBox="0 0 24 24" width="24" height="24" style="display:block;"><polygon points="${starPoints}" fill="rgba(255, 255, 255, 0.25)"/></svg>`;
            
            let starInner = '';
            if (val >= i + 1) {
                starInner = fullStar;
            } else if (val > i && val < i + 1) {
                starInner = `
                    <div style="position:absolute; inset:0;">${emptyStar}</div>
                    <div style="position:absolute; inset:0; width:50%; overflow:hidden;">${fullStar}</div>
                `;
            } else {
                starInner = emptyStar;
            }
            
            html += `<div class="star-wrapper" style="position:relative; width:24px; height:24px; cursor:pointer; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.8));" data-index="${i}">${starInner}</div>`;
        }
        starsContainer.innerHTML = html;

        document.querySelectorAll('.star-wrapper').forEach((star, index) => {
            star.addEventListener('click', (e) => {
                const rect = star.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const isHalf = clickX < rect.width / 2;
                updateStarsUI(index + (isHalf ? 0.5 : 1));
            });
        });
    }


    // --- MANUAL IMAGE UPDATE ---
    function updateImg() {
        const url = prompt(`Paste the direct image URL for the Movie Poster:`);
        if (url && url.trim() !== '') {
            applyPoster(url);
        }
    }

    // --- OMDB API SEARCH & RANDOM LOGIC ---
    const apiKey = '9b03b995';
    const searchInput = document.getElementById('movieSearch');
    const suggContainer = document.getElementById('suggestions');
    const msg = document.getElementById('searchMsg');
    const btn = document.getElementById('searchBtn');
    let debounceTimer;

    function fetchRandomMovie() {
        const randomTitle = popularMovies[Math.floor(Math.random() * popularMovies.length)];
        fetchFullMovie(randomTitle, true);
    }

    // Trigger Random on Page Load
    window.onload = fetchRandomMovie;

    searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        const query = e.target.value.trim();
        if (query.length < 3 || query.toLowerCase().startsWith('tt')) {
            suggContainer.style.display = 'none';
            return;
        }
        debounceTimer = setTimeout(() => fetchSuggestions(query), 400);
    });

    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            triggerManualSearch();
        }
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-wrapper')) suggContainer.style.display = 'none';
    });

    async function fetchSuggestions(query) {
        try {
            let url = `https://www.omdbapi.com/?type=movie&apikey=${apiKey}`;
            const match = query.match(/(.*)\s+(\d{4})$/);
            if (match) {
                url += `&s=${encodeURIComponent(match[1])}&y=${match[2]}`;
            } else {
                url += `&s=${encodeURIComponent(query)}`;
            }

            const response = await fetch(url);
            const data = await response.json();

            if (data.Response === "True" && data.Search) {
                suggContainer.innerHTML = '';
                data.Search.slice(0, 4).forEach(movie => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.onclick = () => selectMovie(movie.imdbID);
                    div.innerHTML = `<div class="sugg-info"><span class="sugg-title">${movie.Title}</span><span class="sugg-year">${movie.Year}</span></div>`;
                    suggContainer.appendChild(div);
                });
                suggContainer.style.display = 'flex';
            } else {
                suggContainer.style.display = 'none';
            }
        } catch (err) {}
    }

    function selectMovie(imdbID) {
        suggContainer.style.display = 'none';
        searchInput.value = ''; 
        fetchFullMovie(imdbID); 
    }

    function triggerManualSearch() {
        const query = searchInput.value.trim();
        if (!query) return;
        suggContainer.style.display = 'none';
        fetchFullMovie(query);
    }

    async function fetchFullMovie(queryOrId, isRandomLoad = false) {
        if (!isRandomLoad) {
            msg.textContent = "Loading...";
            msg.style.color = "#aaa";
        }
        btn.disabled = true;

        let url = `https://www.omdbapi.com/?apikey=${apiKey}`;
        if (queryOrId.toLowerCase().startsWith('tt')) {
            url += `&i=${queryOrId}`;
        } else {
            const match = queryOrId.match(/(.*)\s+(\d{4})$/);
            if (match) {
                url += `&t=${encodeURIComponent(match[1])}&y=${match[2]}`;
            } else {
                url += `&t=${encodeURIComponent(queryOrId)}`;
            }
        }

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data.Response === "True") {
                document.getElementById('movieTitle').textContent = data.Title;
                document.getElementById('movieMeta').textContent = data.Director !== "N/A" ? `dir. ${data.Director}` : "";
                
                // Clear the default review to encourage the user to write their own
                document.getElementById('movieReview').textContent = "";
                
                // Randomize stars between 3.5 and 5 for a realistic starting feel
                const randomRating = (Math.floor(Math.random() * 4) * 0.5) + 3.5;
                updateStarsUI(randomRating);

                if (data.Poster && data.Poster !== "N/A") {
                    applyPoster(data.Poster.replace('SX300', 'SX1000'));
                }
                
                if (!isRandomLoad) {
                    searchInput.value = ""; 
                    msg.style.color = "#4CAF50";
                    msg.textContent = "Movie updated successfully!";
                    setTimeout(() => msg.textContent = "", 3000);
                }
            } else {
                if (!isRandomLoad) {
                    msg.style.color = "#ff6b6b";
                    msg.textContent = data.Error || "Movie not found.";
                }
            }
        } catch (error) {
            if (!isRandomLoad) {
                msg.style.color = "#ff6b6b";
                msg.textContent = "Network error. Try again.";
            }
        } finally {
            btn.disabled = false;
            // Hide the initial loading overlay once the first movie is fully loaded
            if (isRandomLoad) {
                document.getElementById('loadingOverlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 300);
            }
        }
    }
</script>

</body>
</html>
