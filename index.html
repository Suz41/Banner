
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Story Banner Fullscreen</title>

<!-- Clean Professional Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
    --text-main: #ffffff;
    --font-main: 'Inter', sans-serif;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html, body {
    width: 100%;
    height: 100%;
    background: #000000;
    color: var(--text-main);
    font-family: var(--font-main);
    overflow: hidden; /* Locks screen strictly to viewport */
    -webkit-font-smoothing: antialiased;
    user-select: none; 
}

/* --- TRUE FULLSCREEN WRAPPER --- */
.story-wrapper {
    position: fixed;
    inset: 0; /* Perfectly locks to all 4 corners of the screen */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    z-index: 1;
}

/* --- DYNAMIC AMBIENT BACKGROUND --- */
.dynamic-bg-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scale(1.2); /* Bleeds past edges to avoid sharp borders */
    z-index: 0;
}

.dynamic-bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,0.9) 100%);
    z-index: 1;
}

/* 🎞 Grain Texture Overlay */
.story-wrapper::after {
    content: "";
    position: absolute;
    inset: 0;
    background: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.06;
    pointer-events: none;
    z-index: 2;
}

/* --- MAIN CONTENT CENTERER --- */
.main-content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    /* Slight transform to perfectly visually center it against the heavy poster */
    transform: translateY(-2vh); 
}

/* --- EDITABLE FOCUS --- */
[contenteditable="true"] {
    outline: none;
    transition: all 0.2s;
    position: relative;
    z-index: 10;
    user-select: text; 
}
[contenteditable="true"]:focus {
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
}

/* --- POSTER & AVATAR LAYOUT --- */
.poster-wrapper {
    position: relative;
    width: 68%;
    max-width: 320px; 
    aspect-ratio: 2 / 3;
    margin-bottom: 24px;
}

.poster {
    width: 100%;
    height: 100%;
    background-image: url('https://image.tmdb.org/t/p/original/muWA9t1JVAxFBNP6gBbmKxj4VYc.jpg'); 
    background-position: center;
    background-size: cover;
    border-radius: 12px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    border: 2px solid rgba(255, 255, 255, 0.25);
    transition: background-image 0.3s ease;
}

.avatar {
    width: 56px;
    height: 56px;
    /* Reverted to direct URL so it never fails to load */
    background-image: url('https://upperstall.com/wp-content/uploads/2021/05/Satyajit-Ray-as-a-Young-Man-560x600.jpg');
    background-position: center;
    background-size: cover;
    border-radius: 50%;
    position: absolute;
    top: -28px; 
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    border: 3px solid rgba(20, 20, 20, 0.9); 
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
}

/* --- MOVIE INFO --- */
.info-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 90%;
    max-width: 400px;
    gap: 6px;
}

.title {
    font-size: 26px; 
    font-weight: 800;
    letter-spacing: -0.5px;
    text-align: center;
    line-height: 1.1;
    text-shadow: 0 4px 15px rgba(0,0,0,0.8);
    color: #ffffff;
}

.meta {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.85); 
    font-weight: 600;
    margin-bottom: 4px; 
    text-align: center;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
}

/* --- RATING STARS (TIGHT GAP) --- */
.rating-system {
    display: flex;
    align-items: center;
}

.stars {
    display: flex;
    gap: 0px; 
}

/* --- ONE LINE REVIEW --- */
.review-text {
    font-size: 15px;
    font-weight: 500;
    font-style: italic;
    color: rgba(255, 255, 255, 0.95);
    text-align: center;
    margin-top: 6px;
    padding: 0 16px;
    line-height: 1.4;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    width: 100%;
}
.review-text[contenteditable="true"]:empty:before {
    content: "Write a one-line review...";
    color: rgba(255, 255, 255, 0.5);
    pointer-events: none;
    font-style: normal;
}

/* --- ATTRIBUTION / REVIEW SOURCE --- */
.attribution {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    margin-top: 16px;
}

.divider-line {
    display: flex;
    align-items: center;
    width: 60%;
    margin-bottom: 8px;
    color: rgba(255, 255, 255, 0.5);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
}

.divider-line::before, .divider-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255, 255, 255, 0.2);
    margin: 0 12px;
}

.brand-row {
    display: flex;
    align-items: center;
    gap: 8px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}

.brand-name {
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 0.5px;
    color: #ffffff;
}

.brand-separator {
    color: rgba(255, 255, 255, 0.3);
    font-size: 14px;
}

.username {
    font-size: 14px;
    font-weight: 600;
    color: #cccccc;
}

/* --- SMALL COMPACT TOOLBAR --- */
.fixed-bottom-panel {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 360px;
    background: rgba(15, 15, 15, 0.85);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 200;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
}

.fixed-bottom-panel.hidden {
    transform: translate(-50%, 150%);
    opacity: 0;
    pointer-events: none;
}

.compact-row {
    display: flex;
    gap: 8px;
    align-items: center;
}

.search-wrapper { position: relative; flex: 1; }
.search-box { 
    display: flex; 
    background: rgba(255, 255, 255, 0.06); 
    border: 1px solid rgba(255,255,255,0.1); 
    border-radius: 12px; 
    padding: 4px; 
    transition: 0.2s; 
}
.search-box:focus-within { border-color: rgba(255,255,255,0.3); }
.search-box input { 
    flex: 1; 
    background: transparent; 
    border: none; 
    color: #fff; 
    padding: 8px 12px; 
    font-family: inherit; 
    font-size: 13px; 
    outline: none; 
    width: 100%;
}
.search-box input::placeholder { color: rgba(255,255,255,0.3); }
.search-box button { 
    background: #ffffff; 
    color: #000000; 
    border: none; 
    border-radius: 8px; 
    padding: 0 12px; 
    cursor: pointer; 
    font-weight: 700; 
    font-size: 12px; 
}

.tool-btn { 
    background: rgba(255, 255, 255, 0.1); 
    border: 1px solid rgba(255, 255, 255, 0.05); 
    color: #ffffff; 
    height: 38px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    border-radius: 12px; 
    cursor: pointer; 
    font-weight: 600; 
    font-size: 13px; 
    padding: 0 16px;
    white-space: nowrap;
}
.tool-btn:active { background: rgba(255, 255, 255, 0.2); }

/* Dropdown Suggestions */
.suggestions-container { position: absolute; bottom: calc(100% + 16px); left: 0; width: calc(100% + 100px); background: #1a1a1a; border: 1px solid #333; border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 250; display: none; flex-direction: column; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); }
.suggestion-item { display: flex; align-items: center; gap: 12px; padding: 12px; cursor: pointer; border-bottom: 1px solid #222; transition: background 0.2s; }
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover { background: #2a2a2a; }
.sugg-info { display: flex; flex-direction: column; gap: 2px; }
.sugg-title { font-size: 13px; font-weight: 600; color: #fff; }
.sugg-year { font-size: 11px; color: #aaa; }

/* System messages */
.msg-container { height: 12px; text-align: center; }
#searchMsg { font-size: 11px; color: #ff6b6b; font-weight: 500; line-height: 1; }

/* Double Tap Hint Notification */
.hint-toast {
    position: fixed;
    top: 40px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    pointer-events: none;
    transition: opacity 0.5s;
    z-index: 300;
}
</style>
</head>
<body>

<!-- MAIN STORY BANNER FULLSCREEN -->
<div class="story-wrapper" id="storyWrapper">
    
    <!-- Native Canvas Background Blur -->
    <canvas id="bgCanvas" class="dynamic-bg-canvas"></canvas>
    <div class="dynamic-bg-overlay"></div>
    
    <!-- Centered Content Block -->
    <div class="main-content">
        <div class="poster-wrapper">
            <div class="avatar" id="avatarImg"></div>
            <div class="poster" id="posterImg"></div>
        </div>
        
        <div class="info-section">
            <h1 class="title" id="movieTitle" contenteditable="true" spellcheck="false">The Perks of Being a Wallflower</h1>
            <div class="meta" id="movieMeta" contenteditable="true" spellcheck="false">dir. Stephen Chbosky</div>
            
            <div class="rating-system">
                <div class="stars" id="starsContainer">
                    <!-- Stars rendered dynamically -->
                </div>
            </div>
            
            <!-- ONE LINE REVIEW -->
            <div class="review-text" id="movieReview" contenteditable="true" spellcheck="false">"A beautifully heartbreaking coming-of-age story."</div>
            
            <!-- ATTRIBUTION / ARCHIVE -->
            <div class="attribution">
                <div class="divider-line"><span>ON</span></div>
                <div class="brand-row">
                    <span class="brand-name">ARCHIVE</span>
                    <span class="brand-separator">|</span>
                    <span class="username" contenteditable="true" spellcheck="false">@4dwik</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- DOUBLE TAP HINT -->
<div class="hint-toast" id="hintToast">Double-tap anywhere to hide tools</div>

<!-- COMPACT FLOATING TOOLBAR -->
<div class="fixed-bottom-panel" id="toolbar">
    <div class="compact-row">
        <div class="search-wrapper">
            <div id="suggestions" class="suggestions-container"></div>
            <div class="search-box">
                <input type="text" id="movieSearch" placeholder="Search movie..." autocomplete="off">
                <button id="searchBtn" onclick="triggerManualSearch()">Fetch</button>
            </div>
        </div>
        <button class="tool-btn" onclick="updateImg()">Paste Link</button>
    </div>
    <div class="msg-container"><div id="searchMsg"></div></div>
</div>

<script>
    // --- DOUBLE TAP TO TOGGLE LOGIC ---
    const toolbar = document.getElementById('toolbar');
    let uiVisible = true;
    let lastTapTime = 0;

    function toggleUI() {
        uiVisible = !uiVisible;
        if (uiVisible) {
            toolbar.classList.remove('hidden');
        } else {
            toolbar.classList.add('hidden');
            document.getElementById('hintToast').style.opacity = '0';
        }
    }

    // Detect double taps on the document
    document.addEventListener('click', (e) => {
        if (e.target.closest('#toolbar') || 
            e.target.closest('.stars') || 
            e.target.closest('[contenteditable="true"]')) {
            return;
        }

        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTapTime;
        
        if (tapLength < 300 && tapLength > 0) {
            toggleUI();
            e.preventDefault();
        }
        lastTapTime = currentTime;
    });

    // Hide hint automatically
    setTimeout(() => {
        document.getElementById('hintToast').style.opacity = '0';
    }, 4000);


    // --- LOCAL CANVAS BLUR LOGIC ---
    function applyPoster(url) {
        document.getElementById('posterImg').style.backgroundImage = `url('${url}')`;

        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.crossOrigin = "anonymous"; 
        
        img.onload = () => {
            canvas.width = 180; 
            canvas.height = 320;
            ctx.filter = 'blur(15px) brightness(0.4) saturate(1.3)';
            ctx.drawImage(img, -20, -20, canvas.width + 40, canvas.height + 40);
        };
        
        img.onerror = () => {
            img.onload = null;
            img.onerror = null;
            img.src = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
        };
        img.src = url;
    }

    applyPoster('https://image.tmdb.org/t/p/original/muWA9t1JVAxFBNP6gBbmKxj4VYc.jpg');


    // --- PERFECT STAR RATING LOGIC (REDUCED GAP) ---
    const starsContainer = document.getElementById('starsContainer');
    const starPoints = "12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2";

    function updateStarsUI(val) {
        let html = '';
        for (let i = 0; i < 5; i++) {
            const fullStar = `<svg viewBox="0 0 24 24" width="24" height="24" style="display:block;"><polygon points="${starPoints}" fill="#ffffff"/></svg>`;
            const emptyStar = `<svg viewBox="0 0 24 24" width="24" height="24" style="display:block;"><polygon points="${starPoints}" fill="rgba(255, 255, 255, 0.25)"/></svg>`;
            
            let starInner = '';
            if (val >= i + 1) {
                starInner = fullStar;
            } else if (val > i && val < i + 1) {
                starInner = `
                    <div style="position:absolute; inset:0;">${emptyStar}</div>
                    <div style="position:absolute; inset:0; width:50%; overflow:hidden;">${fullStar}</div>
                `;
            } else {
                starInner = emptyStar;
            }
            
            html += `<div class="star-wrapper" style="position:relative; width:24px; height:24px; cursor:pointer; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.8));" data-index="${i}">${starInner}</div>`;
        }
        starsContainer.innerHTML = html;

        document.querySelectorAll('.star-wrapper').forEach((star, index) => {
            star.addEventListener('click', (e) => {
                const rect = star.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const isHalf = clickX < rect.width / 2;
                updateStarsUI(index + (isHalf ? 0.5 : 1));
            });
        });
    }

    updateStarsUI(3);

    // --- MANUAL IMAGE UPDATE ---
    function updateImg() {
        const url = prompt(`Paste the direct image URL for the Movie Poster:`);
        if (url && url.trim() !== '') {
            applyPoster(url);
        }
    }

    // --- OMDB API SEARCH LOGIC ---
    const apiKey = '9b03b995';
    const searchInput = document.getElementById('movieSearch');
    const suggContainer = document.getElementById('suggestions');
    const msg = document.getElementById('searchMsg');
    const btn = document.getElementById('searchBtn');
    let debounceTimer;

    searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        const query = e.target.value.trim();
        if (query.length < 3 || query.toLowerCase().startsWith('tt')) {
            suggContainer.style.display = 'none';
            return;
        }
        debounceTimer = setTimeout(() => fetchSuggestions(query), 400);
    });

    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            triggerManualSearch();
        }
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-wrapper')) suggContainer.style.display = 'none';
    });

    async function fetchSuggestions(query) {
        try {
            let url = `https://www.omdbapi.com/?type=movie&apikey=${apiKey}`;
            const match = query.match(/(.*)\s+(\d{4})$/);
            if (match) {
                url += `&s=${encodeURIComponent(match[1])}&y=${match[2]}`;
            } else {
                url += `&s=${encodeURIComponent(query)}`;
            }

            const response = await fetch(url);
            const data = await response.json();

            if (data.Response === "True" && data.Search) {
                renderSuggestions(data.Search);
            } else {
                suggContainer.style.display = 'none';
            }
        } catch (err) {}
    }

    function renderSuggestions(movies) {
        suggContainer.innerHTML = '';
        movies.slice(0, 5).forEach(movie => {
            const div = document.createElement('div');
            div.className = 'suggestion-item';
            div.onclick = () => selectMovie(movie.imdbID);
            div.innerHTML = `<div class="sugg-info"><span class="sugg-title">${movie.Title}</span><span class="sugg-year">${movie.Year}</span></div>`;
            suggContainer.appendChild(div);
        });
        suggContainer.style.display = 'flex';
    }

    function selectMovie(imdbID) {
        suggContainer.style.display = 'none';
        searchInput.value = ''; 
        fetchFullMovie(imdbID); 
    }

    function triggerManualSearch() {
        const query = searchInput.value.trim();
        if (!query) return;
        suggContainer.style.display = 'none';
        fetchFullMovie(query);
    }

    async function fetchFullMovie(queryOrId) {
        msg.textContent = "Loading...";
        msg.style.color = "#aaa";
        btn.disabled = true;

        let url = `https://www.omdbapi.com/?apikey=${apiKey}`;
        if (queryOrId.toLowerCase().startsWith('tt')) {
            url += `&i=${queryOrId}`;
        } else {
            const match = queryOrId.match(/(.*)\s+(\d{4})$/);
            if (match) {
                url += `&t=${encodeURIComponent(match[1])}&y=${match[2]}`;
            } else {
                url += `&t=${encodeURIComponent(queryOrId)}`;
            }
        }

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data.Response === "True") {
                document.getElementById('movieTitle').textContent = data.Title;
                document.getElementById('movieMeta').textContent = data.Director !== "N/A" ? `dir. ${data.Director}` : "";
                document.getElementById('movieReview').textContent = "";

                if (data.Poster && data.Poster !== "N/A") {
                    applyPoster(data.Poster.replace('SX300', 'SX1000'));
                }
                
                searchInput.value = ""; 
                msg.style.color = "#4CAF50";
                msg.textContent = "Movie updated successfully!";
                setTimeout(() => msg.textContent = "", 3000);
            } else {
                msg.style.color = "#ff6b6b";
                msg.textContent = data.Error || "Movie not found.";
            }
        } catch (error) {
            msg.style.color = "#ff6b6b";
            msg.textContent = "Network error. Try again.";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
