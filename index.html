
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Story Banner Adaptive & Export</title>

<!-- Clean Professional Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- HTML2Canvas Library for High-Res Screenshots -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root {
    --text-main: #ffffff;
    --font-main: 'Inter', sans-serif;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background: #050505;
    color: var(--text-main);
    font-family: var(--font-main);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    -webkit-font-smoothing: antialiased;
}

/* --- STORY CONTAINER (Instagram Aspect Ratio) --- */
.story-wrapper {
    width: 100%;
    max-width: 420px;
    height: 100vh;
    max-height: 850px;
    aspect-ratio: 9 / 16;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #111;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
}

/* --- DYNAMIC AMBIENT BACKGROUND (Fixed for html2canvas) --- */
.bg-container {
    position: absolute;
    inset: -10%; /* Bleed to avoid blurry edges */
    z-index: 0;
    overflow: hidden;
}

.dynamic-bg-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(40px) brightness(0.4) saturate(1.3);
    transform: scale(1.15); /* Forces blur past the edges for html2canvas */
}

.dynamic-bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.8) 100%);
    z-index: 1;
}

/* 🎞 Grain Texture Overlay */
.story-wrapper::after {
    content: "";
    position: absolute;
    inset: 0;
    background: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.06;
    pointer-events: none;
    z-index: 2;
}

/* --- EDITABLE FOCUS --- */
[contenteditable="true"] {
    outline: none;
    transition: all 0.2s;
    position: relative;
    z-index: 10;
}
[contenteditable="true"]:focus {
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
}

/* --- POSTER & AVATAR LAYOUT (Fixed for html2canvas) --- */
.poster-wrapper {
    position: relative;
    width: 75%;
    aspect-ratio: 2 / 3;
    margin-bottom: 24px;
    z-index: 10;
}

.poster {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    border: 2px solid rgba(255, 255, 255, 0.25);
}

.avatar {
    width: 56px;
    height: 56px;
    object-fit: cover;
    border-radius: 50%;
    position: absolute;
    top: -28px; 
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    border: 3px solid rgba(20, 20, 20, 0.8); 
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
}

/* --- MOVIE INFO --- */
.info-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    width: 90%;
    gap: 8px;
}

.title {
    font-size: 26px; 
    font-weight: 800;
    letter-spacing: -0.5px;
    text-align: center;
    line-height: 1.1;
    text-shadow: 0 4px 15px rgba(0,0,0,0.8);
    color: #ffffff;
}

.meta {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.85); 
    font-weight: 600;
    margin-bottom: 6px;
    text-align: center;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
}

/* --- RATING STARS --- */
.rating-system {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
}

.stars {
    display: flex;
    gap: 4px;
    color: #ffffff; 
}

/* --- FIXED BOTTOM PANEL (Search & Tools) --- */
.fixed-bottom-panel {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid #222;
    padding: 16px 16px 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 200;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.fixed-bottom-panel.hidden {
    transform: translate(-50%, 150%);
}

.search-wrapper { position: relative; width: 100%; }
.search-box { display: flex; gap: 8px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 4px; transition: 0.2s; width: 100%; }
.search-box:focus-within { border-color: rgba(255,255,255,0.4); }
.search-box input { flex: 1; background: transparent; border: none; color: #fff; padding: 10px 12px; font-family: inherit; font-size: 14px; outline: none; }
.search-box input::placeholder { color: rgba(255,255,255,0.4); }
.search-box button { background: #ffffff; color: #000000; border: none; border-radius: 6px; padding: 0 16px; cursor: pointer; font-weight: 700; transition: 0.2s; font-size: 13px; }
.search-box button:active { transform: scale(0.95); background: #cccccc; }

.suggestions-container { position: absolute; bottom: calc(100% + 8px); left: 0; right: 0; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; max-height: 200px; overflow-y: auto; z-index: 250; display: none; flex-direction: column; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); }
.suggestion-item { display: flex; align-items: center; gap: 12px; padding: 12px; cursor: pointer; border-bottom: 1px solid #222; transition: background 0.2s; }
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover { background: #2a2a2a; }
.sugg-info { display: flex; flex-direction: column; gap: 2px; }
.sugg-title { font-size: 14px; font-weight: 600; color: #fff; }
.sugg-year { font-size: 12px; color: #aaa; }

.msg-container { height: 14px; margin-top: -4px; text-align: center; }
#searchMsg { font-size: 12px; color: #ff6b6b; font-weight: 500; line-height: 1; }

.bottom-toolbar { display: flex; gap: 8px; width: 100%; }
.tool-btn { background: #1a1a1a; border: 1px solid #333; color: #ffffff; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; font-size: 13px; flex: 1; }
.tool-btn:active { background: #333; transform: scale(0.98); }
.tool-btn.highlight { background: #ffffff; color: #000; border: none; }
.tool-btn.highlight:active { background: #cccccc; }

.toggle-btn { position: fixed; bottom: 24px; right: 20px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; z-index: 199; cursor: pointer; backdrop-filter: blur(4px); transition: 0.2s; }

/* --- PREVIEW OVERLAY --- */
.preview-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.95);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(10px);
}

.preview-overlay.active {
    opacity: 1;
    pointer-events: auto;
}

.preview-img-container {
    width: 85%;
    max-width: 380px;
    max-height: 75vh;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    margin-bottom: 24px;
}

.preview-img-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

.preview-actions { display: flex; gap: 12px; }
.preview-actions button { padding: 14px 24px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: transform 0.2s; }
.preview-actions button:active { transform: scale(0.95); }
.btn-close { background: #333; color: #fff; }
.btn-dl { background: #ffffff; color: #000000; }

#loadingOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    color: white;
    font-weight: bold;
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.2s;
}
</style>
</head>
<body>

<!-- MAIN STORY BANNER -->
<div class="story-wrapper" id="captureTarget">
    <!-- Ambient Dynamic Background using IMG tag for html2canvas compatibility -->
    <div class="bg-container">
        <img class="dynamic-bg-img" id="dynamicBg" src="https://image.tmdb.org/t/p/original/muWA9t1JVAxFBNP6gBbmKxj4VYc.jpg" crossorigin="anonymous">
    </div>
    <div class="dynamic-bg-overlay"></div>
    
    <div class="poster-wrapper">
        <!-- Avatar via proxy to ensure CORS doesn't block the export -->
        <img class="avatar" id="avatarImg" src="https://api.allorigins.win/raw?url=https%3A%2F%2Fupperstall.com%2Fwp-content%2Fuploads%2F2021%2F05%2FSatyajit-Ray-as-a-Young-Man-560x600.jpg" crossorigin="anonymous">
        <img class="poster" id="posterImg" src="https://image.tmdb.org/t/p/original/muWA9t1JVAxFBNP6gBbmKxj4VYc.jpg" crossorigin="anonymous">
    </div>
    
    <div class="info-section">
        <h1 class="title" id="movieTitle" contenteditable="true" spellcheck="false">The Perks of Being a Wallflower</h1>
        <div class="meta" id="movieMeta" contenteditable="true" spellcheck="false">dir. Stephen Chbosky</div>
        
        <div class="rating-system" id="starsContainer">
            <!-- Stars rendered dynamically to ensure html2canvas compatibility -->
        </div>
    </div>
</div>

<!-- TOGGLE UI BUTTON -->
<button class="toggle-btn" id="toggleBtn" onclick="toggleUI()">Hide Tools</button>

<!-- FIXED BOTTOM PANEL -->
<div class="fixed-bottom-panel" id="toolbar">
    <div class="search-wrapper">
        <div id="suggestions" class="suggestions-container"></div>
        <div class="search-box">
            <input type="text" id="movieSearch" placeholder="Search by name..." autocomplete="off">
            <button id="searchBtn" onclick="triggerManualSearch()">Fetch</button>
        </div>
    </div>
    
    <div class="msg-container">
        <div id="searchMsg"></div>
    </div>

    <div class="bottom-toolbar">
        <button class="tool-btn" onclick="updateImg()">Paste Link</button>
        <button class="tool-btn highlight" onclick="generatePreview()">Preview & Export</button>
    </div>
</div>

<!-- PREVIEW & DOWNLOAD MODAL -->
<div class="preview-overlay" id="previewModal">
    <div class="preview-img-container">
        <img id="generatedImage" src="" alt="Generated Story">
    </div>
    <div class="preview-actions">
        <button class="btn-close" onclick="closePreview()">Cancel</button>
        <button class="btn-dl" onclick="downloadImage()">Download High-Res</button>
    </div>
</div>

<div id="loadingOverlay">Generating High-Quality Image...</div>

<script>
    // --- BULLETPROOF STARS FOR HTML2CANVAS ---
    // Instead of using SVG clip-paths (which break in html2canvas), we use overlapping elements
    const starsContainer = document.getElementById('starsContainer');
    const starPoints = "12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2";
    
    function renderStars(rating) {
        let html = '<div class="stars">';
        for (let i = 0; i < 5; i++) {
            const svgFull = `<svg width="28" height="28" viewBox="0 0 24 24"><polygon points="${starPoints}" fill="#ffffff"/></svg>`;
            const svgEmpty = `<svg width="28" height="28" viewBox="0 0 24 24"><polygon points="${starPoints}" fill="rgba(255,255,255,0.2)"/></svg>`;
            
            html += `<div class="star-wrapper" data-index="${i}" style="position:relative; width:28px; height:28px; cursor:pointer; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.8));">`;
            
            if (rating >= i + 1) {
                html += `<div style="position:absolute; inset:0;">${svgFull}</div>`;
            } else if (rating > i && rating < i + 1) {
                // Half star: perfectly cuts the full star at 50% width without clip-paths
                html += `
                    <div style="position:absolute; inset:0;">${svgEmpty}</div>
                    <div style="position:absolute; inset:0; width:50%; overflow:hidden;">${svgFull}</div>
                `;
            } else {
                html += `<div style="position:absolute; inset:0;">${svgEmpty}</div>`;
            }
            html += `</div>`;
        }
        html += '</div>';
        starsContainer.innerHTML = html;

        // Reattach listeners
        document.querySelectorAll('.star-wrapper').forEach((star, index) => {
            star.addEventListener('click', (e) => {
                const rect = star.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const isHalf = clickX < rect.width / 2;
                renderStars(index + (isHalf ? 0.5 : 1));
            });
        });
    }

    renderStars(3);

    // --- EXPORT & SCREENSHOT LOGIC (HTML2CANVAS) ---
    const captureTarget = document.getElementById('captureTarget');
    const previewModal = document.getElementById('previewModal');
    const generatedImage = document.getElementById('generatedImage');
    const loadingOverlay = document.getElementById('loadingOverlay');
    let highResDataUrl = '';

    async function generatePreview() {
        document.activeElement.blur(); 
        loadingOverlay.style.opacity = '1';
        
        // 1. Temporarily lock the aspect ratio to exactly 9:16 (1080x1920 scaled down)
        // This stops it from capturing your current screen height and squashing the image
        const originalWidth = captureTarget.style.width;
        const originalHeight = captureTarget.style.height;
        const originalMaxWidth = captureTarget.style.maxWidth;
        const originalMaxHeight = captureTarget.style.maxHeight;

        captureTarget.style.width = '450px';
        captureTarget.style.height = '800px'; 
        captureTarget.style.maxWidth = '450px';
        captureTarget.style.maxHeight = '800px';

        setTimeout(async () => {
            try {
                const canvas = await html2canvas(captureTarget, {
                    scale: 3, // 3x multiplier = Ultra HD
                    useCORS: true,
                    allowTaint: false,
                    backgroundColor: '#050505',
                    width: 450,
                    height: 800,
                    logging: false
                });

                highResDataUrl = canvas.toDataURL("image/png", 1.0);
                generatedImage.src = highResDataUrl;
                
                // Restore layout
                captureTarget.style.width = originalWidth;
                captureTarget.style.height = originalHeight;
                captureTarget.style.maxWidth = originalMaxWidth;
                captureTarget.style.maxHeight = originalMaxHeight;

                loadingOverlay.style.opacity = '0';
                previewModal.classList.add('active');
            } catch (err) {
                console.error("Screenshot failed:", err);
                loadingOverlay.style.opacity = '0';
                
                // Restore layout on fail
                captureTarget.style.width = originalWidth;
                captureTarget.style.height = originalHeight;
                captureTarget.style.maxWidth = originalMaxWidth;
                captureTarget.style.maxHeight = originalMaxHeight;
                
                alert("Failed to generate image. Please ensure poster URLs allow CORS.");
            }
        }, 400);
    }

    function closePreview() {
        previewModal.classList.remove('active');
        setTimeout(() => { generatedImage.src = ''; }, 300); 
    }

    function downloadImage() {
        if (!highResDataUrl) return;
        const a = document.createElement('a');
        a.href = highResDataUrl;
        a.download = `Story-Banner-${Date.now()}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        closePreview();
    }

    // --- UI Toggle for Clean Screenshots ---
    const toolbar = document.getElementById('toolbar');
    const toggleBtn = document.getElementById('toggleBtn');
    let uiVisible = true;

    function toggleUI() {
        uiVisible = !uiVisible;
        if (uiVisible) {
            toolbar.classList.remove('hidden');
            toggleBtn.textContent = "Hide Tools";
            toggleBtn.style.opacity = "1";
        } else {
            toolbar.classList.add('hidden');
            toggleBtn.textContent = "Show Tools";
            toggleBtn.style.opacity = "0.2"; 
        }
    }

    // --- Update Poster & Ambient Background Logic ---
    function applyPoster(url) {
        document.getElementById('posterImg').src = url;
        document.getElementById('dynamicBg').src = url;
    }

    function updateImg() {
        const url = prompt(`Paste the direct image URL for the Movie Poster:`);
        if (url && url.trim() !== '') {
            applyPoster(url);
        }
    }

    // --- OMDB API Search Logic ---
    const apiKey = '9b03b995';
    const searchInput = document.getElementById('movieSearch');
    const suggContainer = document.getElementById('suggestions');
    const msg = document.getElementById('searchMsg');
    const btn = document.getElementById('searchBtn');
    let debounceTimer;

    searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        const query = e.target.value.trim();
        if (query.length < 3 || query.toLowerCase().startsWith('tt')) {
            suggContainer.style.display = 'none';
            return;
        }
        debounceTimer = setTimeout(() => fetchSuggestions(query), 400);
    });

    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            triggerManualSearch();
        }
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-wrapper')) {
            suggContainer.style.display = 'none';
        }
    });

    async function fetchSuggestions(query) {
        try {
            let url = `https://www.omdbapi.com/?type=movie&apikey=${apiKey}`;
            const match = query.match(/(.*)\s+(\d{4})$/);
            if (match) {
                url += `&s=${encodeURIComponent(match[1])}&y=${match[2]}`;
            } else {
                url += `&s=${encodeURIComponent(query)}`;
            }

            const response = await fetch(url);
            const data = await response.json();

            if (data.Response === "True" && data.Search) {
                suggContainer.innerHTML = '';
                data.Search.slice(0, 5).forEach(movie => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.onclick = () => {
                        suggContainer.style.display = 'none';
                        searchInput.value = ''; 
                        fetchFullMovie(movie.imdbID); 
                    };
                    div.innerHTML = `
                        <div class="sugg-info">
                            <span class="sugg-title">${movie.Title}</span>
                            <span class="sugg-year">${movie.Year}</span>
                        </div>
                    `;
                    suggContainer.appendChild(div);
                });
                suggContainer.style.display = 'flex';
            } else {
                suggContainer.style.display = 'none';
            }
        } catch (err) {}
    }

    function triggerManualSearch() {
        const query = searchInput.value.trim();
        if (!query) return;
        suggContainer.style.display = 'none';
        fetchFullMovie(query);
    }

    async function fetchFullMovie(queryOrId) {
        msg.textContent = "Loading...";
        msg.style.color = "#aaa";
        btn.disabled = true;

        let url = `https://www.omdbapi.com/?apikey=${apiKey}`;
        if (queryOrId.toLowerCase().startsWith('tt')) {
            url += `&i=${queryOrId}`;
        } else {
            const match = queryOrId.match(/(.*)\s+(\d{4})$/);
            if (match) {
                url += `&t=${encodeURIComponent(match[1])}&y=${match[2]}`;
            } else {
                url += `&t=${encodeURIComponent(queryOrId)}`;
            }
        }

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data.Response === "True") {
                document.getElementById('movieTitle').textContent = data.Title;
                const director = data.Director !== "N/A" ? `dir. ${data.Director}` : "";
                document.getElementById('movieMeta').textContent = director;

                if (data.Poster && data.Poster !== "N/A") {
                    const posterUrl = data.Poster.replace('SX300', 'SX1000'); 
                    applyPoster(posterUrl);
                }
                
                searchInput.value = ""; 
                msg.style.color = "#4CAF50";
                msg.textContent = "Movie updated successfully!";
                setTimeout(() => msg.textContent = "", 3000);
            } else {
                msg.style.color = "#ff6b6b";
                msg.textContent = data.Error || "Movie not found.";
            }
        } catch (error) {
            msg.style.color = "#ff6b6b";
            msg.textContent = "Network error. Try again.";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
